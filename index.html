<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หยุดเผือก!</title>
    <style>
        :root { --bg: #fff; --text: #000; --border: #ccc; }
        [data-theme='dark'] { --bg: #000; --text: #0ff; --border: #333; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; 
            transition: 0.2s;
        }
        /* Dropdown Style */
        .nav { position: fixed; top: 20px; right: 20px; }
        select { 
            padding: 8px; border-radius: 5px; background: var(--text); color: var(--bg); 
            border: 1px solid var(--border); cursor: pointer; font-family: inherit;
        }
        #app { text-align: center; max-width: 500px; padding: 20px; }
        .glitch { font-size: 2rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="app">
        <h1 style="color: red;">[ ERROR: 403 Forbidden ]</h1>
        <p>พยายามจะ curl ดู source code หรอ? ไปนอนไป๊!</p>
    </div>

    <div class="nav">
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="system">💻 System</option>
            <option value="dark">🌑 Dark</option>
            <option value="light">☀️ Light</option>
        </select>
    </div>

    <script defer src="/_vercel/insights/script.js"></script>

    <script>
        // --- ส่วน JavaScript หลัก ---
        
        const app = document.getElementById('app');
        const themeSelect = document.getElementById('themeSelect');

        // 1. ระบบจัดการภาษา (ตรวจสอบจากเบราว์เซอร์)
        const userLang = navigator.language || navigator.userLanguage;
        const isThai = userLang.includes('th');

        // 2. เนื้อหาที่จะ Render (ด่าคน curl เป็นหลัก)
        const content = {
            th: {
                title: "ยินดีด้วย คุณไม่ได้ curl",
                desc: "นี่คือหน้า Portfolio ที่เขียนด้วย JS ล้วนๆ เพราะผมขี้เกียจเขียน HTML โง่ๆ ให้คนอื่นมาก๊อป",
                joke: "สถานะ: กำลังพัฒนา (หรือกำลังอู้อยู่ก็ไม่รู้)"
            },
            en: {
                title: "Nice try, Curler!",
                desc: "This is a JS-rendered portfolio. Your curl command sees nothing but garbage.",
                joke: "Status: Coding while sleeping."
            }
        };

        const lang = isThai ? content.th : content.en;

        // 3. ฟังก์ชัน Render หน้าเว็บ
        function renderApp() {
            app.innerHTML = `
                <div class="glitch">${lang.title}</div>
                <p>${lang.desc}</p>
                <hr style="border: 0; border-top: 1px solid var(--border)">
                <p style="font-style: italic; opacity: 0.6;">${lang.joke}</p>
            `;
        }

        // 4. ระบบจัดการธีม (System / Dark / Light)
        function applyTheme(mode) {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (mode === 'dark' || (mode === 'system' && systemDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            localStorage.setItem('theme-pref', mode);
        }

        function changeTheme(val) {
            applyTheme(val);
        }

        // 5. Initial Load
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme-pref') || 'system';
            themeSelect.value = savedTheme;
            applyTheme(savedTheme);
            renderApp(); // พ่นเนื้อหาจริงทับคำด่าใน HTML
        };

        // ฟังการเปลี่ยนแปลงของ System Theme แบบ Real-time
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (themeSelect.value === 'system') applyTheme('system');
        });
    </script>
</body>
</html>
